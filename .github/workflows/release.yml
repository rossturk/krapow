# Releases krapow on tag push (v*). goreleaser builds the linux/darwin ×
# amd64/arm64 matrix, publishes archives + checksums to the GitHub release,
# and (when HOMEBREW_TAP_TOKEN is set) updates widdlab/homebrew-tap.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed so GITHUB_TOKEN can create the release

jobs:
  release:
    # macos-latest is required so we can codesign + notarize the Darwin
    # binaries locally (codesign and notarytool only run on macOS). Linux
    # builds cross-compile just fine from a Mac runner.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # Imports the Developer ID Application cert into a temporary keychain
      # that codesign can see during this job. Cleaned up automatically when
      # the runner is torn down.
      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with repo scope on widdlab/homebrew-tap. Without it, the
          # brews step fails but the release archives still publish.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Threaded into scripts/sign-darwin.sh via the goreleaser post
          # hook on the darwin builds. Apple ID + app-specific password
          # drives notarytool; the cert (above) drives codesign.
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
