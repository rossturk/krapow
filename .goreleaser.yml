# goreleaser config — runs on tag push via .github/workflows/release.yml.
# Local dry-run: `goreleaser release --snapshot --clean --skip=publish`.
version: 2

project_name: krapow

before:
  hooks:
    - go mod tidy

builds:
  - id: krapow
    main: .
    binary: krapow
    # Pure Go (no cgo) so cross-compile is trivial. Strip symbols + paths to
    # keep binaries small and reproducible.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    hooks:
      # Codesign + notarize Darwin binaries before they get archived. The
      # script exits early for non-darwin targets, so Linux builds pass
      # through untouched. Requires the release workflow to be on a macOS
      # runner with the Apple cert imported (apple-actions/import-codesign-certs).
      post:
        - cmd: ./scripts/sign-darwin.sh "{{ .Path }}" "{{ .Target }}"

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^Merge"

# Homebrew formula auto-published to widdlab/homebrew-tap on every tag.
# That tap is the catch-all for all widdlab tools (cirruslabs/homebrew-cli
# does the same thing) — one `brew tap widdlab/tap` covers every project.
# Requires HOMEBREW_TAP_TOKEN secret — a PAT with `repo` scope on that tap
# repo. (GITHUB_TOKEN can't push cross-repo.)
brews:
  - name: krapow
    repository:
      owner: widdlab
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Place the formula under Formula/ so the tap can host multiple tools
    # cleanly. Brew accepts root-level too, but Formula/ scales as we add
    # more widdlab projects to the same tap.
    directory: Formula
    homepage: "https://github.com/widdlab/krapow"
    description: "Run GitHub Actions self-hosted runners as Incus or Tart VMs"
    license: "Apache-2.0"
    install: |
      bin.install "krapow"
    test: |
      system "#{bin}/krapow", "doctor"
    # Tart is only meaningful on macOS hosts; Linux users get Incus separately
    # (apt) since it's not in Homebrew.
    dependencies:
      - name: cirruslabs/cli/tart
        os: mac
